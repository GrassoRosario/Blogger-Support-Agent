services:
  neo4j:
    image: neo4j:latest
    container_name: neo4j-blog
    ports:
      - "7474:7474" 
      - "7687:7687" 
    volumes:
      - neo4j_data:/data
      - neo4j_plugins:/plugins
    environment:
      NEO4J_AUTH: "none"  # Lasciare le credenziali user e password vuote
      NEO4J_PLUGINS: '["apoc"]'
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_plugins: